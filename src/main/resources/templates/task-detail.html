<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{page.title.task_detail}">Task Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-5">
    <h2 th:text="${task.title}">Task Title</h2>
    <div class="card">
        <div class="card-body">
            <p><strong th:text="#{label.task_desc}">Description:</strong> <span th:text="${task.description}">Desc</span></p>
            <p><strong th:text="#{col.status}">Status:</strong> <span th:text="${task.status}">TODO</span></p>
            <p><strong th:text="#{col.priority}">Priority:</strong> <span th:text="${task.priority}">MEDIUM</span></p>
            <p><strong th:text="#{label.task_project}">Project:</strong> <span th:text="${task.project.projectName}">Proj</span></p>
            <p><strong th:text="#{col.assign}">Assignee:</strong> <span th:text="${task.assignee?.username} ?: #{label.unassigned}">User</span></p>
            <p><strong th:text="#{col.date}">Created:</strong> <span th:text="${task.createdAt}">2025-01-01</span></p>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/tasks/{id}/edit(id=${task.id})}" class="btn btn-sm btn-warning mt-2" th:text="#{btn.action_edit}">Edit Task</a>
        </div>
    </div>

    <!-- Status update form -->
    <div class="mt-4">
        <h5 th:text="#{header.status_change}">Change Status</h5>
        <form th:action="@{/tasks/{id}/status(id=${task.id})}" method="post" class="row g-2">
            <!-- CSRF protection token -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label for="newStatus" class="form-label visually-hidden" th:text="#{label.status_change}">Change status</label>
            <div class="col-auto">
                <select id="newStatus" name="newStatus" class="form-select">
                    <option value="TODO" th:text="#{status.TODO}">TODO</option>
                    <option value="IN_PROGRESS" th:text="#{status.IN_PROGRESS}">IN PROGRESS</option>
                    <option value="DONE" th:text="#{status.DONE}">DONE</option>
                </select>
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-primary" th:text="#{btn.update}">Update</button>
            </div>
        </form>
    </div>

    <!-- Audit logs -->
    <div class="mt-4">
        <h5 th:text="#{header.audit_log}">Status Change History</h5>
        <table class="table table-sm" th:if="${!task.logs.isEmpty()}">
            <thead>
            <tr>
                <th th:text="#{col.audit_changed_by}">Changed By</th>
                <th th:text="#{col.audit_old_status}">Old Status</th>
                <th th:text="#{col.audit_new_status}">New Status</th>
                <th th:text="#{col.audit_time}">Time</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="log : ${task.logs}">
                <td th:text="${log.changedBy.username}">User</td>
                <td th:text="${log.oldStatus} ?: #{label.not_applicable}">Old</td>
                <td th:text="${log.newStatus}">New</td>
                <td th:text="${log.changeTime}">Time</td>
            </tr>
            </tbody>
        </table>
        <div th:if="${task.logs.isEmpty()}" class="text-muted" th:text="#{msg.no_audit}">No status changes recorded yet.</div>
    </div>

    <a href="/dashboard" class="btn btn-secondary mt-3" th:text="#{btn.back_to_dashboard}">Back to Dashboard</a>
</div>
</body>
</html>
