<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{page.title.projects}">Projects - TaskForce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 th:text="#{page.header.project_list}">Project List</h2>
        <a href="/projects/new" class="btn btn-primary" th:text="#{btn.project_new}">+ New Project</a>
    </div>
    <table class="table table-hover bg-white border">
        <thead class="table-dark">
        <tr>
            <th th:text="#{col.project_name}">Name</th>
            <th th:text="#{col.project_manager}">Manager</th>
            <th th:text="#{col.project_created}">Created</th>
            <th th:text="#{col.actions}">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="project : ${projectPage.content}">
            <td th:text="${project.projectName}">Project</td>
            <td th:text="${project.manager.username}">Manager</td>
            <td th:text="${project.createdAt}">Date</td>
            <td>
                <form th:action="@{/projects/delete}" method="post" class="d-inline"
                      onsubmit="return confirm(this.getAttribute('data-confirm-message'));"
                      th:attr="data-confirm-message=#{msg.project_delete_confirm}">
                    <input type="hidden" name="id" th:value="${project.id}" />
                    <button type="submit" class="btn btn-sm btn-outline-danger" th:text="#{btn.action_delete}">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Pagination Controls -->
    <nav th:if="${projectPage.totalPages > 1}" aria-label="Page navigation">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${projectPage.isFirst()} ? 'disabled'">
                <a class="page-link" th:href="@{/projects(page=${projectPage.number - 1}, size=${projectPage.size})}" th:text="#{pagination.previous}">Previous</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, projectPage.totalPages - 1)}" th:classappend="${i == projectPage.number} ? 'active'">
                <a class="page-link" th:href="@{/projects(page=${i}, size=${projectPage.size})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${projectPage.isLast()} ? 'disabled'">
                <a class="page-link" th:href="@{/projects(page=${projectPage.number + 1}, size=${projectPage.size})}" th:text="#{pagination.next}">Next</a>
            </li>
        </ul>
    </nav>

    <!-- Message if no projects -->
    <div th:if="${projectPage.isEmpty()}" class="text-center text-muted mt-5" th:text="#{msg.no_projects}">
        No projects available.
    </div>
</div>
</body>
</html>
