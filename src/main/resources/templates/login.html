<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{app.title}">TaskForce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body class="bg-light">
<nav class="navbar navbar-light bg-light">
    <div class="container-fluid justify-content-end">
        <div th:replace="~{fragments/language-switcher :: languageSwitcher}"></div>
    </div>
</nav>
<div class="container mt-5">
    <div class="card mx-auto" style="width: 400px;">
        <div class="card-body p-4 p-sm-5">
            <div class="auth-logo-container">
                <img th:src="@{/images/logo.png}" alt="Logo" class="auth-logo">
            </div>
            <h2 class="text-center mb-4" th:text="#{btn.login}">Login</h2>
            <div th:if="${param.registered}" class="alert alert-success" th:text="#{msg.register_success}">Registration successful. Please log in.</div>
            <div th:if="${param.logout}" class="alert alert-info" th:text="#{msg.logout_success}">You have been logged out.</div>
            <div th:if="${param.error}" class="alert alert-danger" th:text="#{msg.login_fail}">Invalid username or password.</div>

            <form th:action="@{/login}" method="post">
                <!-- CSRF protection token -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="mb-3">
                    <label for="username" class="form-label" th:text="#{label.username}">Username</label>
                    <input id="username" type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label" th:text="#{label.password}">Password</label>
                    <input id="password" type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" th:text="#{btn.login}">Login</button>
            </form>
            <div class="mt-3 text-center">
                <a th:href="@{/register}" th:text="#{link.create_account}">Create an account</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
