<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom" th:fragment="navbar">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="/dashboard">
                <img th:src="@{/images/logo.png}" alt="Logo" style="height: 40px; margin-right: 10px;">
                <span th:text="#{app.title}">TaskForce</span>
            </a>
            <div class="d-flex align-items-center">
                <!-- Project management link (visible to ADMIN) -->
                <a sec:authorize="hasRole('ADMIN')" href="/projects" class="btn btn-sm btn-outline-secondary me-3" th:text="#{nav.projects}">Projects</a>
                
                <!-- Logout form -->
                <form th:action="@{/logout}" method="post" class="m-0 me-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-sm btn-outline-danger" th:text="#{nav.logout}">Logout</button>
                </form>
                
                <!-- Language Switcher -->
                <div th:replace="~{fragments/language-switcher :: languageSwitcher}"></div>
            </div>
        </div>
    </nav>
</body>
</html>
