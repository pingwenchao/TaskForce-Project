<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{dialog.edit_title}">Edit Task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-5">
    <h2 th:text="#{dialog.edit_title}">Edit Task</h2>
    <form th:action="@{/tasks/update}" method="post" th:object="${task}">
        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="mb-3">
            <label for="title" class="form-label" th:text="#{label.task_title}">Title</label>
            <input id="title" type="text" th:field="*{title}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="description" class="form-label" th:text="#{label.task_desc}">Description</label>
            <textarea id="description" th:field="*{description}" class="form-control" rows="2"></textarea>
        </div>
        <div class="mb-3">
            <label for="priority" class="form-label" th:text="#{col.priority}">Priority</label>
            <select id="priority" th:field="*{priority}" class="form-select" required>
                <option value="HIGH" th:text="#{priority.HIGH}">HIGH</option>
                <option value="MEDIUM" th:text="#{priority.MEDIUM}">MEDIUM</option>
                <option value="LOW" th:text="#{priority.LOW}">LOW</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="project" class="form-label" th:text="#{label.task_project}">Project</label>
            <select id="project" th:field="*{project.id}" class="form-select" required>
                <option th:each="p : ${projects}" th:value="${p.id}" th:text="${p.projectName}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label for="assignee" class="form-label" th:text="#{label.assign_to}">Assign To</label>
            <select id="assignee" th:field="*{assignee.id}" class="form-select">
                <option value="" th:text="#{label.unassigned}">Unassigned</option>
                <option th:each="u : ${users}" th:value="${u.id}" th:text="${u.username}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-success" th:text="#{btn.confirm}">Confirm</button>
        <a th:href="@{/tasks/{id}(id=${task.id})}" class="btn btn-secondary" th:text="#{btn.cancel}">Cancel</a>
    </form>
</div>
</body>
</html>
