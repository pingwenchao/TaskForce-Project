<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title th:text="#{app.title}">TaskForce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
    <style>
        .status-container {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 380px;
            width: 380px;
        }
        .status-badge {
            width: 100px;
            min-width: 100px;
            text-align: center;
            display: inline-block;
        }
        .status-form {
            display: flex;
            align-items: center;
            gap: 4px;
            min-width: 260px;
            width: 260px;
        }
        .status-select {
            width: 140px;
            min-width: 140px;
        }
        .priority-badge {
            width: 70px;
            min-width: 70px;
            text-align: center;
            display: inline-block;
        }
        .btn-disabled {
            pointer-events: auto !important;
            cursor: not-allowed !important;
        }
        .btn-disabled:hover {
            opacity: 0.8;
        }
        .btn.btn-disabled {
            cursor: not-allowed !important;
        }
        table th:nth-child(1) { width: 20%; }
        table th:nth-child(2) { width: 380px; min-width: 380px; }
        table th:nth-child(3) { width: 100px; min-width: 100px; }
        table th:nth-child(4) { width: 15%; }
        table th:nth-child(5) { width: 180px; min-width: 180px; }
    </style>
    <script th:inline="javascript">
        var permissionDeniedMsg = /*[[#{msg.permission_denied}]]*/ 'Permission denied';
    </script>
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <!-- Welcome message and new task button -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4><span th:text="#{header.welcome}">Welcome, </span> <span th:text="${currentUser}">User</span></h4>
        <div>
            <a sec:authorize="hasRole('ADMIN')" href="/projects" class="btn btn-outline-primary me-2" th:text="#{nav.projects}">Projects</a>
            <a sec:authorize="hasRole('ADMIN')" href="/tasks/new" class="btn btn-primary" th:text="#{btn.add}">+ New Task</a>
            <a sec:authorize="!hasRole('ADMIN')" href="#" class="btn btn-outline-secondary btn-disabled me-2" th:text="#{nav.projects}" onclick="alert(permissionDeniedMsg); return false;">Projects</a>
        </div>
    </div>

    <!-- Task table card -->
    <div class="card">
        <div class="card-body">
            <table class="table table-borderless">
                <thead>
                <tr>
                    <th th:text="#{col.title}">Title</th>
                    <th th:text="#{col.status}">Status</th>
                    <th th:text="#{col.priority}">Priority</th>
                    <th th:text="#{col.assign}">Assigned To</th>
                    <th th:text="#{col.actions}">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="task : ${taskPage.content}">
                    <td>
                        <a th:href="@{/tasks/{id}(id=${task.id})}" th:text="${task.title}">Title</a>
                    </td>
                    <td>
                        <div class="status-container">
                            <!-- Status badge with color -->
                            <span class="badge status-badge" 
                                  th:classappend="${task.status == 'TODO'} ? 'bg-warning text-dark' : 
                                                 (${task.status == 'IN_PROGRESS'} ? 'bg-primary' : 'bg-success')"
                                  th:text="#{'status.' + ${task.status}}">STATUS</span>
                            <form th:action="@{/tasks/{id}/status(id=${task.id})}" method="post" class="status-form">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <label class="visually-hidden" th:for="'newStatus-' + ${task.id}" th:text="#{label.status_change}">Change status</label>
                                <select th:id="'newStatus-' + ${task.id}" name="newStatus" class="form-select form-select-sm status-select"
                                        th:disabled="${!#authorization.expression('hasRole(''ADMIN'')') and (task.assignee == null or #authentication.principal.username != task.assignee.username)}">
                                    <option value="" th:text="#{prompt.status_change}">Change...</option>
                                    <option value="TODO" th:text="#{status.TODO}">TODO</option>
                                    <option value="IN_PROGRESS" th:text="#{status.IN_PROGRESS}">IN_PROGRESS</option>
                                    <option value="DONE" th:text="#{status.DONE}">DONE</option>
                                </select>
                                <button type="submit" class="btn btn-sm btn-primary" th:text="#{btn.update}"
                                        th:disabled="${!#authorization.expression('hasRole(''ADMIN'')') and (task.assignee == null or #authentication.principal.username != task.assignee.username)}">Update</button>
                            </form>
                        </div>
                    </td>
                    <td>
                        <!-- Priority badge with color -->
                        <span class="badge priority-badge"
                              th:classappend="${task.priority == 'HIGH'} ? 'bg-danger' : 
                                             (${task.priority == 'MEDIUM'} ? 'bg-warning text-dark' : 'bg-success')"
                              th:text="#{'priority.' + ${task.priority}}">PRI</span>
                    </td>
                    <td>
                        <span th:text="${task.assignee?.username} ?: #{label.unassigned}" class="text-muted">Assign</span>
                    </td>
                    <td class="action-buttons">
                        <!-- ADMIN can see enabled buttons -->
                        <div sec:authorize="hasRole('ADMIN')">
                            <a th:href="@{/tasks/{id}/edit(id=${task.id})}" class="btn btn-sm btn-outline-primary me-1" th:text="#{btn.action_edit}">Edit</a>
                            <form th:action="@{/tasks/delete}" method="post" class="d-inline"
                                  onsubmit="return confirm(this.getAttribute('data-confirm-message'));"
                                  th:attr="data-confirm-message=#{msg.delete_confirm}">
                                <input type="hidden" name="id" th:value="${task.id}" />
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="btn btn-sm btn-outline-danger" th:text="#{btn.action_delete}">Delete</button>
                            </form>
                        </div>
                        <!-- EMPLOYEE sees disabled grey buttons -->
                        <div sec:authorize="!hasRole('ADMIN')">
                            <a href="#" class="btn btn-sm btn-outline-secondary btn-disabled me-1" th:text="#{btn.action_edit}" onclick="alert(permissionDeniedMsg); return false;">Edit</a>
                            <button class="btn btn-sm btn-outline-secondary btn-disabled" th:text="#{btn.action_delete}" onclick="alert(permissionDeniedMsg); return false;">Delete</button>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Pagination Controls -->
    <nav th:if="${taskPage.totalPages > 1}" aria-label="Page navigation" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${taskPage.isFirst()} ? 'disabled'">
                <a class="page-link" th:href="@{/dashboard(page=${taskPage.number - 1}, size=${taskPage.size})}" th:text="#{pagination.previous}">Previous</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, taskPage.totalPages - 1)}" th:classappend="${i == taskPage.number} ? 'active'">
                <a class="page-link" th:href="@{/dashboard(page=${i}, size=${taskPage.size})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${taskPage.isLast()} ? 'disabled'">
                <a class="page-link" th:href="@{/dashboard(page=${taskPage.number + 1}, size=${taskPage.size})}" th:text="#{pagination.next}">Next</a>
            </li>
        </ul>
    </nav>

    <!-- Message if no tasks -->
    <div th:if="${taskPage.isEmpty()}" class="text-center text-muted mt-5" th:text="#{msg.no_tasks}">
        No tasks available.
    </div>
</div>
</body>
</html>
