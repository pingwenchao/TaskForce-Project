<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title th:text="#{app.title}">TaskForce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <!-- Welcome message and new task button -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4><span th:text="#{header.welcome}">Welcome, </span> <span th:text="${currentUser}">User</span></h4>
        <a sec:authorize="hasRole('ADMIN')" href="/tasks/new" class="btn btn-primary" th:text="#{btn.add}">+ New Task</a>
    </div>

    <!-- Task table card -->
    <div class="card">
        <div class="card-body">
            <table class="table table-borderless">
                <thead>
                <tr>
                    <th th:text="#{col.title}">Title</th>
                    <th th:text="#{col.status}">Status</th>
                    <th th:text="#{col.priority}">Priority</th>
                    <th th:text="#{col.assign}">Assigned To</th>
                    <th th:text="#{col.actions}">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="task : ${taskPage.content}">
                    <td>
                        <a th:href="@{/tasks/{id}(id=${task.id})}" th:text="${task.title}">Title</a>
                    </td>
                    <td>
                        <span class="badge bg-info" th:text="${task.status}">STATUS</span>
                        <!-- Inline status update form with CSRF token -->
                        <form th:action="@{/tasks/{id}/status(id=${task.id})}" method="post" class="d-inline ms-1">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <label class="visually-hidden" th:for="'newStatus-' + ${task.id}" th:text="#{label.status_change}">Change status</label>
                            <select th:id="'newStatus-' + ${task.id}" name="newStatus" onchange="this.form.submit()" class="form-select form-select-sm d-inline w-auto"
                                    th:disabled="${!#authorization.expression('hasRole(''ADMIN'')') and (task.assignee == null or #authentication.principal.username != task.assignee.username)}">
                                <option value="" th:text="#{prompt.status_change}">Change...</option>
                                <option value="TODO" th:text="#{status.TODO}">TODO</option>
                                <option value="IN_PROGRESS" th:text="#{status.IN_PROGRESS}">IN_PROGRESS</option>
                                <option value="DONE" th:text="#{status.DONE}">DONE</option>
                            </select>
                        </form>
                    </td>
                    <td>
                        <span class="badge bg-secondary" th:text="${task.priority}">PRI</span>
                    </td>
                    <td>
                        <span th:text="${task.assignee?.username} ?: #{label.unassigned}" class="text-muted">Assign</span>
                    </td>
                    <td sec:authorize="hasRole('ADMIN')">
                        <!-- <a th:href="@{/tasks/edit/{id}(id=${task.id})}" class="btn btn-sm btn-outline-primary" th:text="#{btn.action_edit}">Edit</a> -->
                        <form th:action="@{/tasks/delete}" method="post" class="d-inline"
                              onsubmit="return confirm(this.getAttribute('data-confirm-message'));"
                              th:attr="data-confirm-message=#{msg.delete_confirm}">
                            <input type="hidden" name="id" th:value="${task.id}" />
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-sm btn-outline-danger" th:text="#{btn.action_delete}">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Pagination Controls -->
    <nav th:if="${taskPage.totalPages > 1}" aria-label="Page navigation" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${taskPage.isFirst()} ? 'disabled'">
                <a class="page-link" th:href="@{/dashboard(page=${taskPage.number - 1}, size=${taskPage.size})}" th:text="#{pagination.previous}">Previous</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, taskPage.totalPages - 1)}" th:classappend="${i == taskPage.number} ? 'active'">
                <a class="page-link" th:href="@{/dashboard(page=${i}, size=${taskPage.size})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${taskPage.isLast()} ? 'disabled'">
                <a class="page-link" th:href="@{/dashboard(page=${taskPage.number + 1}, size=${taskPage.size})}" th:text="#{pagination.next}">Next</a>
            </li>
        </ul>
    </nav>

    <!-- Message if no tasks -->
    <div th:if="${taskPage.isEmpty()}" class="text-center text-muted mt-5" th:text="#{msg.no_tasks}">
        No tasks available.
    </div>
</div>
</body>
</html>
