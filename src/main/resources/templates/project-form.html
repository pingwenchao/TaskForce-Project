<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{page.title.project_new}">New Project - TaskForce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-5">
    <h2 th:text="#{page.header.project_new}">Create New Project</h2>
    <form th:action="@{/projects/add}" method="post">
        <!-- CSRF protection token -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="mb-3">
            <label for="projectName" class="form-label" th:text="#{label.project_name}">Project Name</label>
            <input id="projectName" type="text" name="projectName" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="description" class="form-label" th:text="#{label.project_desc}">Description</label>
            <textarea id="description" name="description" class="form-control" rows="2"></textarea>
        </div>
        <div class="mb-3">
            <label for="managerId" class="form-label" th:text="#{label.project_manager}">Manager</label>
            <select id="managerId" name="managerId" class="form-select" required>
                <option value="" th:text="#{prompt.project_manager_select}">Select Manager</option>
                <option th:each="u : ${managers}" th:value="${u.id}" th:text="${u.username}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-success" th:text="#{btn.project_save}">Save Project</button>
        <a href="/projects" class="btn btn-secondary" th:text="#{btn.cancel}">Cancel</a>
    </form>
</div>
</body>
</html>
