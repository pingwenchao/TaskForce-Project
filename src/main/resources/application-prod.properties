# Production configuration for TaskForce
# This profile is activated with: --spring.profiles.active=prod
# All credentials MUST be provided via environment variables in production

# Oracle database connection - credentials from environment variables (REQUIRED)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA / Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=validate
# Disable SQL logging in production for performance
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Thymeleaf template engine - enable caching in production
spring.thymeleaf.cache=true

# Internationalization (i18n) resource bundles
spring.messages.basename=GroupProject/Messages
spring.messages.encoding=UTF-8
spring.web.locale=en

# Logging - reduced output for production
logging.level.root=WARN
logging.level.com.upm.taskforce=INFO
logging.level.org.springframework.security=INFO

# Server configuration for production
server.compression.enabled=true
server.compression.min-response-size=1024

