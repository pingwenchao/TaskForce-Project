# --- Database Configuration (Oracle) ---
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@fsktmdbora.upm.edu.my:1521:fsktm}
spring.datasource.username=${DB_USERNAME:D226969}
spring.datasource.password=${DB_PASSWORD:226969}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# HikariCP Connection Pool Configuration (Fixes ORA-17008)
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.pool-name=TaskForceHikariPool
spring.datasource.hikari.connection-test-query=SELECT 1 FROM DUAL

# JPA / Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf template engine
spring.thymeleaf.cache=false

# Internationalization (i18n) resource bundles
spring.messages.basename=GroupProject/Messages
spring.messages.encoding=UTF-8
