﻿# Oracle database connection (UPM server)
# Use environment variables for security: set DB_URL, DB_USERNAME, DB_PASSWORD
# Development defaults provided for testing; override with environment variables in production
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@fsktmdbora.upm.edu.my:1521:fsktm}
spring.datasource.username=${DB_USERNAME:D226969}
spring.datasource.password=${DB_PASSWORD:226969}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA / Hibernate settings
# Use unified Oracle dialect for Hibernate 6.x (covers 12c and later)
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
# 'none' gives full control to our DataInitializer
spring.jpa.hibernate.ddl-auto=none
# Display formatted SQL in console for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf template engine
spring.thymeleaf.cache=false

# Internationalization (i18n) resource bundles
spring.messages.basename=GroupProject/Messages
spring.messages.encoding=UTF-8